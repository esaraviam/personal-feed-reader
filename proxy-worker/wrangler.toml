name = "daily-brief-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Set ALLOWED_ORIGIN to your deployed app domain to restrict CORS, e.g.:
# ALLOWED_ORIGIN = "https://your-app.pages.dev"
# Leave unset (or "*") during development.

# To add AUTH_KEY (recommended for production):
#   npx wrangler secret put AUTH_KEY
# Then set VITE_PROXY_KEY in your app's .env.production

[[routes]]
# Uncomment and fill in after deploying your custom domain (optional):
# pattern = "proxy.yourdomain.com"
# zone_name = "yourdomain.com"
