name = "daily-brief-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Set ALLOWED_ORIGIN to your deployed app domain to restrict CORS, e.g.:
# ALLOWED_ORIGIN = "https://feeds.millamanque.cl"
# Leave unset (or "*") during development.

# Secrets (set via `wrangler secret put`):
#   AUTH_KEY  — shared secret for CORS proxy + feed sync endpoint

# ── Intelligence Pipeline ─────────────────────────────────────────────────────

# D1 database binding.
# To create: npx wrangler d1 create daily-brief-db
# Then replace PLACEHOLDER with the returned database_id.
[[d1_databases]]
binding = "DB"
database_name = "daily-brief-db"
database_id = "PLACEHOLDER_RUN_WRANGLER_D1_CREATE"

# Workers AI binding (embeddings + LLM summarization in later phases).
[ai]
binding = "AI"

# Cron triggers:
#   */30 * * * *  — RSS ingestion every 30 minutes
#   0 6 * * *     — Daily digest build at 06:00 UTC
[triggers]
crons = ["*/30 * * * *", "0 6 * * *"]
